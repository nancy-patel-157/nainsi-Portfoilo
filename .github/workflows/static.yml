name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NODE_ENV: production

      - name: Add SPA fallback (404.html)
        run: |
          if [ -d "dist" ]; then OUT=dist; \
          elif [ -d "build/client" ]; then OUT=build/client; \
          elif [ -d ".output/public" ]; then OUT=.output/public; \
          else OUT=$(find . -maxdepth 3 -type d -name "client" | head -n1); fi
          echo "Publishing $OUT"
          cp "$OUT/index.html" "$OUT/404.html" || true
          echo "$OUT" > .publish-dir

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ hashFiles('.publish-dir') && '' || 'dist' }}

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
